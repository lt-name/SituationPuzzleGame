# ============================
# SituationPuzzleGame 配置文件
# ============================

# 模型提供商
# 先在这里集中定义多个提供商，再在 generator / answerer 里选择使用哪一个。
# api-type 只表示协议格式，支持 openai 或 anthropic。
# api-url 可以只写基础地址，插件会按 api-type 自动补全请求端点。
providers:
  deepseek-generator:
    api-type: "openai"
    api-url: "https://api.deepseek.com"
    api-key: "请输入您的 Deepseek API 密钥"
    model: "deepseek-v4-pro"
    thinking-type: "enabled"
    reasoning-effort: "high"

  deepseek-answerer:
    api-type: "openai"
    api-url: "https://api.deepseek.com"
    api-key: "请输入您的 Deepseek API 密钥"
    model: "deepseek-v4-flash"
    thinking-type: "disabled"

  # 如果您还没有 OpenCode GO 订阅，可以通过此链接获取：https://opencode.ai/go?ref=G249DGCKQF
  opencode-go-generator:
    api-type: "openai"
    api-url: "https://opencode.ai/zen/go/v1"
    api-key: "请输入您的 OpenCode GO API 密钥"
    model: "deepseek-v4-pro"
    thinking-type: "enabled"
    reasoning-effort: "high"

  opencode-go-answerer:
    api-type: "openai"
    api-url: "https://opencode.ai/zen/go/v1"
    api-key: "请输入您的 OpenCode GO API 密钥"
    model: "deepseek-v4-flash"
    thinking-type: "disabled"

# 题目生成 AI（用于自动出题）
generator:
  # 选择上面的提供商名称
  provider: "deepseek-generator"

  # 难度等级配置
  difficulties:
    easy:
      name: "简单"
      stars: "⭐⭐"
      description: "新人向"
    normal:
      name: "普通"
      stars: "⭐⭐⭐"
      description: "标准海龟汤"
    hard:
      name: "困难"
      stars: "⭐⭐⭐⭐"
      description: "推理爱好者"
    hell:
      name: "地狱"
      stars: "⭐⭐⭐⭐⭐"
      description: "硬核推理"

# 回答 AI（用于判断是/不是/无关）
answerer:
  # 选择上面的提供商名称
  provider: "deepseek-answerer"

# 统计追踪
stats:
  # 是否启用统计功能
  enabled: true
  # 排行榜显示人数
  leaderboard-size: 10
  # 自动保存间隔（秒）
  auto-save-interval: 300
  # 命中率排行榜最低提问数要求
  min-questions-for-hit-rate: 10

# 题目缓存
cache:
  # 是否启用题目缓存（缓存AI生成的题目到本地，减少API调用）
  enabled: true
  # 每个难度最大缓存题目数
  max-per-difficulty: 20
