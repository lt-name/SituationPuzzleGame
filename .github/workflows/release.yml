name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.value }}
      is_snapshot: ${{ steps.check_snapshot.outputs.is_snapshot }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Extract Maven version
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Check snapshot
        id: check_snapshot
        run: |
          if [[ "${{ steps.version.outputs.value }}" == *"-SNAPSHOT" ]]; then
            echo "is_snapshot=true" >> $GITHUB_OUTPUT
            echo "::error::Maven version is SNAPSHOT (${VERSION}), skipping release"
            exit 1
          else
            echo "is_snapshot=false" >> $GITHUB_OUTPUT
          fi

      - name: Build with Maven
        run: mvn package -B

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ steps.version.outputs.value }}
          body: |
            ## SituationPuzzleGame ${{ steps.version.outputs.value }}
          files: |
            target/*.jar
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
